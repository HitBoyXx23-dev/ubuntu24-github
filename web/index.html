<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ubuntu 24.04</title>
  <style>
    *{box-sizing:border-box}html,body{min-height:100%;margin:0}body{display:grid;place-items:center;padding:24px;color:#fff;background:radial-gradient(circle at 50% 0,#31146e 0,#100c22 38%,#05050b 75%);font-family:Inter,system-ui,sans-serif}main{width:min(820px,100%)}.brand{display:flex;align-items:center;gap:14px;margin-bottom:28px}.logo{display:grid;place-items:center;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#5b7cff,#9b4dff);box-shadow:0 18px 50px #714cff55;font-size:27px;font-weight:900}.eyebrow{margin:0 0 4px;color:#928da8;font-size:13px;letter-spacing:.15em;text-transform:uppercase}h1{margin:0;font-size:clamp(30px,6vw,54px);line-height:1.05}p{margin:12px 0 0;color:#bbb6cf;line-height:1.65}.status{display:inline-flex;align-items:center;gap:9px;margin-top:18px;padding:8px 12px;border:1px solid #37324d;border-radius:999px;background:#0d0c16cc;color:#ded9eb;font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:#45e38b;box-shadow:0 0 18px #45e38b}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:30px}.card{position:relative;overflow:hidden;display:block;min-height:245px;padding:27px;color:#fff;text-decoration:none;border:1px solid #38324f;border-radius:22px;background:linear-gradient(145deg,#171525,#0b0a12);box-shadow:0 25px 70px #0008;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}.card:before{content:"";position:absolute;inset:-80px auto auto -80px;width:180px;height:180px;border-radius:50%;background:#714cff22;filter:blur(8px)}.card:hover{transform:translateY(-5px);border-color:#775cff;box-shadow:0 30px 90px #000a}.icon{position:relative;display:grid;place-items:center;width:54px;height:54px;margin-bottom:48px;border-radius:16px;background:linear-gradient(135deg,#4266ff,#9145ff);font-size:24px;font-weight:800}.card strong{position:relative;display:block;margin-bottom:10px;font-size:25px}.card span{position:relative;color:#aaa5bd;line-height:1.55}.arrow{position:absolute;right:24px;bottom:24px;color:#7f68ff;font-size:25px}footer{margin-top:22px;color:#716d82;font-size:13px;text-align:center}@media(max-width:650px){.grid{grid-template-columns:1fr}.card{min-height:210px}.icon{margin-bottom:34px}}
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="logo">U</div>
      <div>
        <div class="eyebrow">GitHub Codespaces</div>
        <h1>Ubuntu 24.04</h1>
      </div>
    </div>
    <p>Choose how you want to enter your Ubuntu workspace.</p>
    <div class="status"><span class="dot"></span>Workspace online</div>
    <section class="grid">
      <a class="card" href="/desktop/vnc.html?autoconnect=true&resize=scale&path=websockify">
        <div class="icon">▣</div>
        <strong>Desktop</strong>
        <span>Open the graphical Ubuntu workspace through noVNC.</span>
        <div class="arrow">→</div>
      </a>
      <a class="card" href="/terminal/">
        <div class="icon">›_</div>
        <strong>Terminal</strong>
        <span>Open the password-protected Ubuntu command line.</span>
        <div class="arrow">→</div>
      </a>
    </section>
    <footer>Terminal username: user · Default passwords: 1234</footer>
  </main>
</body>
</html>
