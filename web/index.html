<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ubuntu 24.04</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      color: #f7f7f7;
      background: #2c001e;
      font-family: Ubuntu, Cantarell, Arial, sans-serif;
    }
    header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 22px;
      background: #3b0b2b;
      border-bottom: 1px solid rgba(255,255,255,.14);
    }
    header strong { font-size: 15px; font-weight: 600; }
    main {
      width: min(700px, calc(100% - 32px));
      margin: 64px auto;
    }
    h1 { margin: 0; font-size: 30px; font-weight: 500; }
    .subtitle { margin: 8px 0 28px; color: #d2c5cc; font-size: 15px; }
    .panel {
      overflow: hidden;
      background: #3b0b2b;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
    }
    .item {
      display: flex;
      align-items: center;
      min-height: 92px;
      padding: 18px 20px;
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .item:last-child { border-bottom: 0; }
    .item:hover { background: #4b1238; }
    .icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      margin-right: 16px;
      flex: 0 0 auto;
      color: #fff;
      background: #e95420;
      border-radius: 6px;
      font-family: monospace;
      font-size: 18px;
      font-weight: 700;
    }
    .content { min-width: 0; flex: 1; }
    .title { display: block; margin-bottom: 4px; font-size: 17px; font-weight: 600; }
    .description { display: block; color: #cbbdc6; font-size: 14px; line-height: 1.4; }
    .arrow { margin-left: 18px; color: #d8cdd3; font-size: 20px; }
    footer { margin-top: 16px; color: #b9a8b2; font-size: 13px; }
    @media (max-width: 520px) {
      main { margin-top: 36px; }
      .item { min-height: 86px; padding: 16px; }
    }
  </style>
</head>
<body>
  <header><strong>Ubuntu 24.04</strong></header>
  <main>
    <h1>Choose a workspace</h1>
    <p class="subtitle">Open the desktop or use the terminal.</p>
    <section class="panel">
      <a class="item" href="/desktop/vnc.html?autoconnect=true&resize=scale&path=websockify">
        <span class="icon">▣</span>
        <span class="content">
          <span class="title">Desktop</span>
          <span class="description">Open the graphical Ubuntu desktop.</span>
        </span>
        <span class="arrow">›</span>
      </a>
      <a class="item" href="/terminal/">
        <span class="icon">&gt;_</span>
        <span class="content">
          <span class="title">Terminal</span>
          <span class="description">Open the Ubuntu command line.</span>
        </span>
        <span class="arrow">›</span>
      </a>
    </section>
    <footer>Terminal username: user · Default password: 1234</footer>
  </main>
</body>
</html>
